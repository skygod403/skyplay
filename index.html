<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Play — VPN Grátis</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --neon: #00f5ff;
  --purple: #a855f7;
  --green: #00ff88;
  --bg: #04080f;
  --card: rgba(0,245,255,0.04);
  --border: rgba(0,245,255,0.15);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: #c8e6f0;
  font-family: 'Exo 2', sans-serif;
  overflow-x: hidden;
}

/* Canvas fica atrás de tudo */
#canvas-bg {
  position: fixed; inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* Ruído — pointer-events: none garante que não bloqueie cliques */
.noise {
  position: fixed; inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0.3;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
}

/* Scan line */
.scanline {
  position: fixed; left: 0; top: -2px;
  width: 100%; height: 2px;
  z-index: 2;
  pointer-events: none;
  background: linear-gradient(90deg, transparent, var(--neon), var(--purple), transparent);
  opacity: 0.25;
  animation: scan 5s linear infinite;
}
@keyframes scan { from { top: -2px; } to { top: 100%; } }

/* Logo */
.logo {
  position: fixed; top: 22px; left: 28px;
  z-index: 10;
  display: flex; align-items: center; gap: 10px;
}
.logo-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--neon), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 0 18px rgba(0,245,255,0.4);
}
.logo-text { font-size: 1.15rem; font-weight: 900; color: #fff; letter-spacing: 1px; }
.logo-text span { color: var(--neon); }

/* HERO */
.hero {
  position: relative;
  z-index: 3;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 40px 20px;
}

.badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--neon);
  text-transform: uppercase;
  border: 1px solid var(--border);
  background: rgba(0,245,255,0.05);
  padding: 6px 20px;
  border-radius: 2px;
  margin-bottom: 28px;
  animation: fadeUp 0.7s 0.1s ease both;
}

h1 {
  font-size: clamp(3.2rem, 9vw, 7rem);
  font-weight: 900;
  line-height: 1;
  letter-spacing: -3px;
  margin-bottom: 16px;
  animation: fadeUp 0.7s 0.2s ease both;
  color: #fff;
}
h1 .sky  { color: var(--neon);   text-shadow: 0 0 30px rgba(0,245,255,0.5); }
h1 .play { color: var(--purple); text-shadow: 0 0 30px rgba(168,85,247,0.5); }

.sub {
  font-size: 1rem;
  color: rgba(200,230,240,0.5);
  max-width: 400px;
  line-height: 1.7;
  margin-bottom: 44px;
  animation: fadeUp 0.7s 0.3s ease both;
}

/* BOTÃO PRINCIPAL */
.btn-main {
  position: relative;
  display: inline-flex; align-items: center; gap: 12px;
  background: transparent;
  border: 2px solid var(--neon);
  color: var(--neon);
  font-family: 'Exo 2', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 17px 52px;
  border-radius: 4px;
  cursor: pointer;
  overflow: hidden;
  transition: color 0.3s, box-shadow 0.3s;
  animation: fadeUp 0.7s 0.4s ease both;
  box-shadow: 0 0 28px rgba(0,245,255,0.18);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.btn-main::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--neon), var(--purple));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.35s cubic-bezier(.4,0,.2,1);
  z-index: 0;
}
.btn-main:hover::before,
.btn-main:active::before { transform: scaleX(1); }
.btn-main:hover,
.btn-main:active { color: #04080f; box-shadow: 0 0 55px rgba(0,245,255,0.45); }
.btn-main > * { position: relative; z-index: 1; }
.btn-main svg { width: 20px; height: 20px; transition: transform 0.3s; }
.btn-main:hover svg { transform: translateY(4px); }

/* Stats */
.stats {
  display: flex; gap: 48px;
  margin-top: 52px;
  animation: fadeUp 0.7s 0.55s ease both;
}
.stat { text-align: center; }
.stat-val {
  font-size: 1.9rem; font-weight: 900;
  background: linear-gradient(135deg, var(--neon), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-lab {
  font-size: 0.62rem; letter-spacing: 2.5px;
  color: rgba(200,230,240,0.35);
  text-transform: uppercase;
  font-family: 'Share Tech Mono', monospace;
  margin-top: 2px;
}

/* OVERLAY / MODAL */
.overlay {
  position: fixed; inset: 0;
  z-index: 200;
  background: rgba(4,8,15,0.93);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s;
}
.overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  width: 100%; max-width: 820px;
  background: #06101e;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 32px 28px;
  transform: translateY(24px) scale(0.97);
  transition: transform 0.35s cubic-bezier(.4,0,.2,1);
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 0 80px rgba(0,245,255,0.07);
}
.overlay.open .modal {
  transform: translateY(0) scale(1);
}

.modal-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 22px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 1.2rem; font-weight: 900; color: #fff; }
.modal-title span { color: var(--neon); }
.modal-sub {
  font-size: 0.65rem; color: rgba(200,230,240,0.35);
  font-family: 'Share Tech Mono', monospace;
  letter-spacing: 1px; margin-top: 4px;
}
.close-btn {
  background: none;
  border: 1px solid var(--border);
  cursor: pointer;
  color: rgba(200,230,240,0.5);
  width: 34px; height: 34px;
  border-radius: 4px;
  font-size: 17px;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.2s, border-color 0.2s, background 0.2s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.close-btn:hover,
.close-btn:active { color: var(--neon); border-color: var(--neon); background: rgba(0,245,255,0.07); }

/* ABAS PC / CELULAR */
.tabs {
  display: flex; gap: 8px;
  margin-bottom: 22px;
}
.tab-btn {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border);
  color: rgba(200,230,240,0.5);
  font-family: 'Exo 2', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 12px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.25s;
  -webkit-tap-highlight-color: transparent;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.tab-btn.active {
  background: rgba(0,245,255,0.1);
  border-color: var(--neon);
  color: var(--neon);
  box-shadow: 0 0 20px rgba(0,245,255,0.12);
}
.tab-btn:hover:not(.active) {
  border-color: rgba(0,245,255,0.4);
  color: rgba(200,230,240,0.8);
}

/* Painéis */
.tab-panel {
  display: none;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
}
.tab-panel.active { display: grid; }

/* Card VPN */
.vpn-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px 14px 14px;
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
  text-align: center;
  position: relative; overflow: hidden;
  transition: border-color 0.25s, background 0.25s, transform 0.25s, box-shadow 0.25s;
}
.vpn-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.vpn-card:hover {
  border-color: rgba(0,245,255,0.4);
  background: rgba(0,245,255,0.07);
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(0,245,255,0.08);
}
.vpn-card:hover::before { opacity: 1; }

.vpn-icon {
  width: 50px; height: 50px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.vpn-name { font-size: 0.88rem; font-weight: 800; color: #fff; }
.vpn-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem; letter-spacing: 1.5px;
  padding: 3px 10px; border-radius: 2px;
  text-transform: uppercase;
  background: rgba(0,255,136,0.1);
  color: var(--green);
  border: 1px solid rgba(0,255,136,0.25);
}
.vpn-info {
  font-size: 0.65rem;
  color: rgba(200,230,240,0.38);
  font-family: 'Share Tech Mono', monospace;
}

.dl-btn {
  width: 100%;
  background: transparent;
  border: 1px solid rgba(0,245,255,0.25);
  color: rgba(200,230,240,0.75);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 8px 6px;
  border-radius: 3px;
  cursor: pointer;
  margin-top: 2px;
  transition: background 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.dl-btn:hover,
.dl-btn:active {
  background: var(--neon);
  color: #04080f;
  border-color: var(--neon);
  box-shadow: 0 0 16px rgba(0,245,255,0.35);
}

/* BARRA DE PROGRESSO */
.prog-wrap {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #06101e;
  border: 1px solid rgba(0,245,255,0.25);
  border-radius: 6px;
  padding: 16px 24px;
  z-index: 999;
  min-width: 270px;
  max-width: 90vw;
  opacity: 0;
  transition: transform 0.4s cubic-bezier(.4,0,.2,1), opacity 0.4s;
  box-shadow: 0 0 40px rgba(0,245,255,0.1);
  pointer-events: none;
}
.prog-wrap.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
.prog-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.72rem; letter-spacing: 1px;
  color: var(--green);
  margin-bottom: 10px;
  display: flex; justify-content: space-between;
}
.prog-track {
  height: 4px;
  background: rgba(0,245,255,0.08);
  border-radius: 2px; overflow: hidden;
}
.prog-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--neon), var(--purple));
  border-radius: 2px;
  transition: width 0.1s linear;
  box-shadow: 0 0 10px rgba(0,245,255,0.5);
}

/* Footer */
.footer {
  position: fixed; bottom: 12px; right: 18px;
  z-index: 4;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem; letter-spacing: 2px;
  color: rgba(200,230,240,0.18);
  pointer-events: none;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,245,255,0.2); border-radius: 2px; }

@media (max-width: 500px) {
  .stats { gap: 26px; }
  .modal { padding: 22px 14px; }
  .tab-panel { grid-template-columns: 1fr 1fr !important; }
  h1 { letter-spacing: -2px; }
  .tabs { flex-direction: column; }
}
</style>
</head>
