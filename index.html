<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Play — VPN Grátis</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --neon:#00f5ff;
  --purple:#a855f7;
  --green:#00ff88;
  --bg:#04080f;
}
html,body{
  height:100%;
  background:var(--bg);
  color:#c8e6f0;
  font-family:'Exo 2',sans-serif;
  overflow-x:hidden;
}

/* canvas */
#canvas-bg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* scanline */
.scanline{
  position:fixed;left:0;top:0;width:100%;height:2px;
  z-index:1;pointer-events:none;
  background:linear-gradient(90deg,transparent,var(--neon),var(--purple),transparent);
  opacity:.2;animation:scan 5s linear infinite;
}
@keyframes scan{from{top:0}to{top:100%}}

/* logo */
.logo{
  position:fixed;top:20px;left:24px;z-index:10;
  display:flex;align-items:center;gap:10px;
}
.logo-icon{
  width:36px;height:36px;border-radius:8px;
  background:linear-gradient(135deg,var(--neon),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 0 18px rgba(0,245,255,.4);
}
.logo-text{font-size:1.1rem;font-weight:900;color:#fff;letter-spacing:1px}
.logo-text span{color:var(--neon)}

/* ── HERO ── */
.hero{
  position:relative;z-index:2;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px 20px;
}
.badge{
  font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;
  color:var(--neon);text-transform:uppercase;
  border:1px solid rgba(0,245,255,.2);background:rgba(0,245,255,.05);
  padding:6px 20px;border-radius:2px;margin-bottom:28px;
}
h1{
  font-size:clamp(3rem,9vw,7rem);font-weight:900;line-height:1;
  letter-spacing:-3px;margin-bottom:14px;color:#fff;
}
h1 .sky {color:var(--neon);  text-shadow:0 0 30px rgba(0,245,255,.5)}
h1 .play{color:var(--purple);text-shadow:0 0 30px rgba(168,85,247,.5)}
.sub{
  font-size:.98rem;color:rgba(200,230,240,.5);max-width:400px;
  line-height:1.7;margin-bottom:44px;
}

/* ── BOTÃO PRINCIPAL ── */
.btn-main{
  position:relative;
  display:inline-flex;align-items:center;gap:12px;
  background:transparent;
  border:2px solid var(--neon);color:var(--neon);
  font-family:'Exo 2',sans-serif;font-size:1rem;font-weight:800;
  letter-spacing:3px;text-transform:uppercase;
  padding:17px 52px;border-radius:4px;cursor:pointer;overflow:hidden;
  box-shadow:0 0 28px rgba(0,245,255,.18);
  -webkit-tap-highlight-color:transparent;
  transition:color .3s,box-shadow .3s;
}
.btn-main::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,var(--neon),var(--purple));
  transform:scaleX(0);transform-origin:left;
  transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:0;
}
.btn-main:hover::before,.btn-main:active::before{transform:scaleX(1)}
.btn-main:hover,.btn-main:active{color:#04080f;box-shadow:0 0 55px rgba(0,245,255,.45)}
.btn-main>*{position:relative;z-index:1}
.btn-main svg{width:20px;height:20px;transition:transform .3s}
.btn-main:hover svg{transform:translateY(4px)}

/* stats */
.stats{display:flex;gap:44px;margin-top:50px}
.stat{text-align:center}
.stat-val{
  font-size:1.9rem;font-weight:900;
  background:linear-gradient(135deg,var(--neon),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.stat-lab{
  font-size:.6rem;letter-spacing:2.5px;
  color:rgba(200,230,240,.35);text-transform:uppercase;
  font-family:'Share Tech Mono',monospace;margin-top:2px;
}

/* ══════════════════════════════════════
   MODAL — implementação simples e direta
   sem overlay separado, sem opacity tricks
   ═════════════════════════════════════ */
#modal-wrap{
  /* escondido por padrão */
  display:none;
  position:fixed;inset:0;
  z-index:9999;
  background:rgba(4,8,15,.95);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  align-items:center;justify-content:center;
  padding:20px;
  overflow-y:auto;
}
/* quando aberto: display flex */
#modal-wrap.aberto{
  display:flex;
}

.modal{
  width:100%;max-width:820px;
  background:#060f1d;
  border:1px solid rgba(0,245,255,.18);
  border-radius:10px;
  padding:30px 26px;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 0 80px rgba(0,245,255,.08);
  /* animação de entrada via margin */
  animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}

.modal-head{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:20px;padding-bottom:16px;
  border-bottom:1px solid rgba(0,245,255,.12);
}
.modal-title{font-size:1.2rem;font-weight:900;color:#fff}
.modal-title span{color:var(--neon)}
.modal-sub{
  font-size:.62rem;color:rgba(200,230,240,.3);
  font-family:'Share Tech Mono',monospace;letter-spacing:1px;margin-top:4px;
}
.close-btn{
  background:none;border:1px solid rgba(0,245,255,.2);cursor:pointer;
  color:rgba(200,230,240,.5);width:34px;height:34px;border-radius:4px;
  font-size:18px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:color .2s,border-color .2s,background .2s;
  -webkit-tap-highlight-color:transparent;
}
.close-btn:hover,.close-btn:active{
  color:var(--neon);border-color:var(--neon);background:rgba(0,245,255,.07)
}

/* abas */
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab-btn{
  flex:1;background:transparent;
  border:1px solid rgba(0,245,255,.15);color:rgba(200,230,240,.5);
  font-family:'Exo 2',sans-serif;font-size:.82rem;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  padding:12px;border-radius:4px;cursor:pointer;
  transition:all .2s;-webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.tab-btn.ativa{
  background:rgba(0,245,255,.1);border-color:var(--neon);color:var(--neon);
  box-shadow:0 0 20px rgba(0,245,255,.12);
}
.tab-btn:hover:not(.ativa){border-color:rgba(0,245,255,.35);color:rgba(200,230,240,.8)}

/* painel */
.painel{display:none}
.painel.ativo{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(178px,1fr));
  gap:13px;
}

/* card vpn */
.vpn-card{
  background:rgba(0,245,255,.03);
  border:1px solid rgba(0,245,255,.12);
  border-radius:8px;padding:18px 13px 13px;
  display:flex;flex-direction:column;align-items:center;gap:9px;
  text-align:center;position:relative;overflow:hidden;
  transition:border-color .25s,background .25s,transform .25s;
}
.vpn-card:hover{
  border-color:rgba(0,245,255,.35);background:rgba(0,245,255,.07);
  transform:translateY(-3px);
}
.vpn-icon{
  width:48px;height:48px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;font-size:21px;
}
.vpn-name{font-size:.86rem;font-weight:800;color:#fff}
.vpn-tag{
  font-family:'Share Tech Mono',monospace;font-size:.56rem;letter-spacing:1.5px;
  padding:3px 10px;border-radius:2px;text-transform:uppercase;
  background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.25);
}
.vpn-info{font-size:.63rem;color:rgba(200,230,240,.38);font-family:'Share Tech Mono',monospace}

.dl-btn{
  width:100%;background:transparent;
  border:1px solid rgba(0,245,255,.22);color:rgba(200,230,240,.72);
  font-family:'Share Tech Mono',monospace;font-size:.6rem;
  letter-spacing:1px;text-transform:uppercase;
  padding:8px 6px;border-radius:3px;cursor:pointer;margin-top:1px;
  transition:background .18s,color .18s,border-color .18s,box-shadow .18s;
  -webkit-tap-highlight-color:transparent;
}
.dl-btn:hover,.dl-btn:active{
  background:var(--neon);color:#04080f;border-color:var(--neon);
  box-shadow:0 0 16px rgba(0,245,255,.35);
}

/* progresso */
.prog{
  position:fixed;bottom:26px;left:50%;
  transform:translateX(-50%) translateY(120px);
  background:#060f1d;border:1px solid rgba(0,245,255,.25);
  border-radius:6px;padding:15px 22px;
  z-index:99999;min-width:260px;max-width:90vw;
  opacity:0;pointer-events:none;
  transition:transform .4s cubic-bezier(.4,0,.2,1),opacity .4s;
  box-shadow:0 0 40px rgba(0,245,255,.1);
}
.prog.show{transform:translateX(-50%) translateY(0);opacity:1}
.prog-label{
  font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:1px;
  color:var(--green);margin-bottom:10px;display:flex;justify-content:space-between;
}
.prog-track{height:4px;background:rgba(0,245,255,.08);border-radius:2px;overflow:hidden}
.prog-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--neon),var(--purple));
  border-radius:2px;transition:width .1s linear;
  box-shadow:0 0 10px rgba(0,245,255,.5);
}

.footer{
  position:fixed;bottom:10px;right:16px;z-index:4;pointer-events:none;
  font-family:'Share Tech Mono',monospace;font-size:.55rem;letter-spacing:2px;
  color:rgba(200,230,240,.16);
}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.hero .badge{animation:fadeUp .6s .1s both}
.hero h1{animation:fadeUp .6s .2s both}
.hero .sub{animation:fadeUp .6s .3s both}
.hero .btn-main{animation:fadeUp .6s .4s both}
.hero .stats{animation:fadeUp .6s .5s both}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,245,255,.2);border-radius:2px}

@media(max-width:500px){
  .stats{gap:24px}
  .modal{padding:20px 13px}
  .painel.ativo{grid-template-columns:1fr 1fr!important}
  h1{letter-spacing:-2px}
  .tabs{flex-direction:column}
}
</style>
</head>

/* ─── MONTAR CARDS ───────────────────────────────────────────────────────── */
function montarCards(lista, idContainer) {
  const el = document.getElementById(idContainer);
  lista.forEach(v => {
    const div = document.createElement('div');
    div.className = 'vpn-card';
    div.innerHTML = `
      <div class="vpn-icon" style="background:${v.cor}22;border:1px solid ${v.cor}55">${v.icon}</div>
      <div class="vpn-name">${v.name}</div>
      <span class="vpn-tag">100% Grátis</span>
      <div class="vpn-info">${v.info}</div>
      ${v.btns.map(b=>`<button class="dl-btn" data-url="${b.url}" data-label="${v.name} — ${b.os}">⬇ ${b.os}</button>`).join('')}
    `;
    div.querySelectorAll('.dl-btn').forEach(btn => {
      btn.onclick = e => { e.stopPropagation(); baixar(btn.dataset.url, btn.dataset.label); };
    });
    el.appendChild(div);
  });
}

/* ─── MODAL ABRIR / FECHAR ──────────────────────────────────────────────── */
const wrap = document.getElementById('modal-wrap');
const modal = document.getElementById('modal');

document.getElementById('abrirBtn').onclick = () => {
  wrap.classList.add('aberto');
};

document.getElementById('fecharBtn').onclick = () => {
  wrap.classList.remove('aberto');
};

// fechar clicando fora do modal
wrap.onclick = e => {
  if (e.target === wrap) wrap.classList.remove('aberto');
};

// fechar com ESC
document.onkeydown = e => {
  if (e.key === 'Escape') wrap.classList.remove('aberto');
};

// clique dentro do modal não propaga
modal.onclick = e => e.stopPropagation();

/* ─── ABAS ───────────────────────────────────────────────────────────────── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('ativa', b.dataset.tab === tab));
    document.querySelectorAll('.painel').forEach(p => p.classList.toggle('ativo', p.id === 'tab-' + tab));
  };
});

/* ─── DOWNLOAD + BARRA ───────────────────────────────────────────────────── */
const progEl   = document.getElementById('prog');
const progNome = document.getElementById('progNome');
const progPct  = document.getElementById('progPct');
const progFill = document.getElementById('progFill');
let timer;

function baixar(url, label) {
  // cria link invisível e dispara download
  const a = document.createElement('a');
  a.href = url; a.download = ''; a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  animarBarra(label);
}

function animarBarra(label) {
  clearInterval(timer);
  let p = 0;
  progNome.textContent = '⬇ ' + label;
  progPct.textContent  = '0%';
  progFill.style.width = '0%';
  progEl.classList.add('show');
  timer = setInterval(() => {
    p = Math.min(p + (p < 70 ? Math.random()*9+3 : Math.random()*2.5+.5), 98);
    progFill.style.width = p + '%';
    progPct.textContent  = Math.round(p) + '%';
    if (p >= 98) {
      clearInterval(timer);
      progFill.style.width = '100%'; progPct.textContent = '100%';
      progNome.textContent = '✔ Download iniciado!';
      setTimeout(() => progEl.classList.remove('show'), 2800);
    }
  }, 110);
}

/* ─── PARTÍCULAS ─────────────────────────────────────────────────────────── */
const cv = document.getElementById('canvas-bg');
const cx = cv.getContext('2d');
let W, H, pts;

const resize = () => { W = cv.width = innerWidth; H = cv.height = innerHeight; };
const mkP = () => ({
  x:Math.random()*W, y:Math.random()*H,
  vx:(Math.random()-.5)*.38, vy:(Math.random()-.5)*.38,
  r:Math.random()*1.4+.4, c:Math.random()>.5?'0,245,255':'168,85,247'
});

const loop = () => {
  cx.clearRect(0,0,W,H);
  for(let i=0;i<pts.length;i++){
    for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<130){
        cx.beginPath(); cx.strokeStyle=`rgba(0,245,255,${.08*(1-d/130)})`; cx.lineWidth=.5;
        cx.moveTo(pts[i].x,pts[i].y); cx.lineTo(pts[j].x,pts[j].y); cx.stroke();
      }
    }
    cx.beginPath(); cx.arc(pts[i].x,pts[i].y,pts[i].r,0,Math.PI*2);
    cx.fillStyle=`rgba(${pts[i].c},.5)`; cx.fill();
    pts[i].x+=pts[i].vx; pts[i].y+=pts[i].vy;
    if(pts[i].x<0||pts[i].x>W) pts[i].vx*=-1;
    if(pts[i].y<0||pts[i].y>H) pts[i].vy*=-1;
  }
  requestAnimationFrame(loop);
};

window.addEventListener('resize', resize);
resize(); pts = Array.from({length:95}, mkP); loop();
</script>
